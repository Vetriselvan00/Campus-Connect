<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Campus Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#eef2ff",
              100: "#e0e7ff",
              500: "#6366f1",
              600: "#4f46e5",
              700: "#4338ca"
            }
          },
          boxShadow: {
            soft: "0 10px 30px rgba(15, 23, 42, 0.08)"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="min-h-screen">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
        <div class="flex items-center gap-3">
          <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-brand-600 font-bold text-white">CC</div>
          <div>
            <h1 class="text-lg font-bold text-slate-900">Campus Connect</h1>
            <p class="text-xs text-slate-500">Student Profile</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <a href="dashboard.html" class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 hover:border-brand-200 hover:text-brand-700">Back to Dashboard</a>
          <a id="profileFriendsButton" href="friends.html" title="Friends" aria-label="Friends" class="flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 text-xl text-slate-700 hover:border-brand-200 hover:bg-brand-50 hover:text-brand-700">&#128101;</a>
          <div class="relative">
            <a id="profileRequestsButton" href="requests.html" title="Incoming Requests" aria-label="Incoming Requests" class="flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 text-xl text-slate-700 hover:border-brand-200 hover:bg-brand-50 hover:text-brand-700">&#128075;</a>
            <span id="incomingRequestDot" class="absolute right-1.5 top-1.5 hidden h-2.5 w-2.5 rounded-full bg-red-500 ring-2 ring-white"></span>
          </div>
          <button id="dmAdminButton" type="button" title="DM to Admin" aria-label="DM to Admin" class="flex h-11 w-11 items-center justify-center rounded-2xl border border-brand-200 text-xl text-brand-700 hover:bg-brand-50">&#128737;&#65039;</button>
          <button id="logoutButton" type="button" class="rounded-xl border border-red-200 px-4 py-2 text-sm font-semibold text-red-600 hover:bg-red-50">Logout</button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-6 py-10">
      <div class="grid gap-8 lg:grid-cols-3">
        <div class="rounded-3xl bg-white p-8 shadow-soft">
          <div class="flex flex-col items-center text-center">
            <div id="profileInitial" class="flex h-28 w-28 items-center justify-center rounded-full bg-brand-100 text-3xl font-bold text-brand-700">
              U
            </div>
            <h2 class="mt-5 text-2xl font-bold text-slate-900">Student Profile</h2>
            <p class="mt-2 text-sm text-slate-500">Manage your academic and campus identity.</p>
          </div>

          <div class="mt-8 space-y-4">
            <div class="rounded-2xl bg-slate-50 p-4">
              <p class="text-xs uppercase tracking-wide text-slate-400">Account Type</p>
              <p class="mt-1 font-semibold text-slate-800">Student</p>
            </div>
            <div class="rounded-2xl bg-slate-50 p-4">
              <p class="text-xs uppercase tracking-wide text-slate-400">Member Tag</p>
              <p id="profileMemberTag" class="mt-1 font-semibold text-slate-800">Campus Member</p>
            </div>
            <div class="grid gap-3">
              <div class="rounded-2xl bg-slate-50 p-4 text-center">
                <p class="text-xs uppercase tracking-wide text-slate-400">Friends</p>
                <p id="profileFriendsCount" class="mt-2 text-2xl font-bold text-slate-900">0</p>
              </div>
            </div>
          </div>
        </div>

        <div class="rounded-3xl bg-white p-8 shadow-soft lg:col-span-2">
          <div class="flex items-center justify-between">
            <div>
              <h3 class="text-2xl font-bold text-slate-900">Profile Information</h3>
              <p class="mt-1 text-slate-500">Keep your details up to date for a better experience.</p>
            </div>
            <div class="flex gap-3">
              <button id="profileEditButton" type="button" title="Edit Profile" aria-label="Edit Profile" class="rounded-2xl border border-slate-200 px-4 py-3 text-xl font-semibold text-slate-700 hover:border-brand-200 hover:text-brand-700">&#9998;</button>
              <button id="profileSaveButton" type="button" class="hidden rounded-2xl bg-brand-600 px-5 py-3 text-sm font-semibold text-white hover:bg-brand-700">Save Changes</button>
            </div>
          </div>

          <form id="profileForm" class="mt-8 grid gap-5 md:grid-cols-2">
            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Full Name</label>
              <input name="name" type="text" disabled class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-500" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">College Email</label>
              <input
                type="email"
                id="email"
                name="email"
                pattern="^[0-9]{10}@student\.annauniv\.edu$"
                title="Enter a valid college email in the format 10digits@student.annauniv.edu"
                readonly
                class="w-full rounded-2xl border border-slate-200 bg-slate-100 px-4 py-3 text-slate-600 outline-none"
              />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Department</label>
              <input name="department" type="text" disabled class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-500" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Academic Year</label>
              <input name="year" type="text" disabled class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-500" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Register Number</label>
              <input name="registerNumber" type="text" disabled class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-500" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">Phone Number</label>
              <input name="phone" type="text" disabled class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-500" />
            </div>

            <div class="md:col-span-2">
              <label class="mb-2 block text-sm font-medium text-slate-700">Member Tag</label>
              <input name="memberTag" type="text" disabled class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-500" />
            </div>

            <div class="md:col-span-2">
              <label class="mb-2 block text-sm font-medium text-slate-700">About Yourself</label>
              <textarea name="about" rows="5" disabled class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-500"></textarea>
            </div>
          </form>
        </div>
      </div>

    </main>
  </div>
</body>
</html>
