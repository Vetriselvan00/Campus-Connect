<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Campus Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#eef2ff",
              100: "#e0e7ff",
              500: "#6366f1",
              600: "#4f46e5",
              700: "#4338ca"
            }
          },
          boxShadow: {
            soft: "0 10px 30px rgba(15, 23, 42, 0.08)"
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
  <div class="flex min-h-screen items-center justify-center px-6 py-10">
    <div class="w-full max-w-4xl rounded-3xl bg-white p-8 shadow-soft">
      <div class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-slate-900">Create Your Account</h1>
        <p class="mt-2 text-slate-500">Register to access Campus Connect</p>
      </div>

      <form id="registerForm" class="grid gap-5 md:grid-cols-2">
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Full Name</label>
          <input name="name" type="text" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div>
  <label class="mb-2 block text-sm font-medium text-slate-700">College Email</label>
  <input
    type="email"
    id="email"
    name="collegeEmail"
    placeholder="Enter your college email"
    pattern="^[0-9]{10}@student\.annauniv\.edu$"
    title="Enter a valid college email in the format 10digits@student.annauniv.edu"
    required
    class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500"
  />
</div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Department</label>
          <input name="department" type="text" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Year</label>
          <input name="year" type="text" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Register Number</label>
          <input name="registerNumber" type="text" placeholder="Usually your 10-digit register number" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Phone Number</label>
          <input name="phone" type="text" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">Member Tag</label>
          <input name="memberTag" type="text" placeholder="Example: Notes Buddy, Study Partner, Lab Guide" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">About Yourself</label>
          <textarea name="about" rows="4" placeholder="Tell other students what you like to share, study, or help with." class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500"></textarea>
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">Password</label>
          <input name="password" type="password" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">Confirm Password</label>
          <input name="confirmPassword" type="password" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div class="md:col-span-2">
          <button type="submit" class="w-full rounded-2xl bg-brand-600 px-5 py-3 font-semibold text-white shadow-soft hover:bg-brand-700">
            Register
          </button>
        </div>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500">
        Already have an account?
        <a href="login.html" class="font-semibold text-brand-600 hover:text-brand-700">Login</a>
      </p>
    </div>
  </div>
</body>
</html>
