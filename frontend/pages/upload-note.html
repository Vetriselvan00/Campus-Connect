<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Note | Campus Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#eef2ff",
              100: "#e0e7ff",
              500: "#6366f1",
              600: "#4f46e5",
              700: "#4338ca"
            }
          },
          boxShadow: {
            soft: "0 10px 30px rgba(15, 23, 42, 0.08)"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
      <div class="flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-brand-600 font-bold text-white">CC</div>
        <div>
          <h1 class="text-lg font-bold text-slate-900">Campus Connect</h1>
          <p class="text-xs text-slate-500">Upload Academic Content</p>
        </div>
      </div>
      <a href="notes.html" class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 hover:border-brand-200 hover:text-brand-700">Back to Notes</a>
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-6 py-10">
    <div class="rounded-3xl bg-white p-8 shadow-soft">
      <div>
        <h2 class="text-3xl font-bold text-slate-900">Upload New Material</h2>
        <p class="mt-2 text-slate-500">Share notes, question papers, important questions, and learning resources.</p>
      </div>

      <form class="mt-8 grid gap-5 md:grid-cols-2">
        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">Title</label>
          <input type="text" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Department</label>
          <select class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500">
            <option>Select Department</option>
          </select>
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Subject</label>
          <input type="text" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Category</label>
          <select class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500">
            <option>Select Category</option>
          </select>
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Difficulty Tag</label>
          <select class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500">
            <option>Select Difficulty</option>
          </select>
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">Description</label>
          <textarea rows="5" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500"></textarea>
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">Upload File</label>
          <div class="rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 px-6 py-10 text-center">
            <p class="font-medium text-slate-700">Drag and drop file here</p>
            <p class="mt-1 text-sm text-slate-500">or click to browse from your computer</p>
          </div>
        </div>

        <div class="md:col-span-2">
          <button type="submit" class="w-full rounded-2xl bg-brand-600 px-5 py-3 font-semibold text-white shadow-soft hover:bg-brand-700">
            Upload Material
          </button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
