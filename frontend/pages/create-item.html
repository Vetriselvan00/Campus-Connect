<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Item | Campus Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
      <div class="flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-brand-600 font-bold text-white">CC</div>
        <div>
          <h1 class="text-lg font-bold text-slate-900">Campus Connect</h1>
          <p class="text-xs text-slate-500">Create Item Listing</p>
        </div>
      </div>
      <a href="items.html" class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 hover:border-brand-200 hover:text-brand-700">Back to Items</a>
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-6 py-10">
    <div class="rounded-3xl bg-white p-8 shadow-soft">
      <div>
        <h2 class="text-3xl font-bold text-slate-900">Post a New Item</h2>
        <p class="mt-2 text-slate-500">Post a normal listing for admin approval, or switch on emergency need to make it visible to students immediately.</p>
      </div>

      <form id="createItemForm" class="mt-8 grid gap-5 md:grid-cols-2">
        <div class="md:col-span-2 rounded-2xl border border-red-100 bg-red-50/70 p-4">
          <label class="flex items-start gap-3">
            <input type="checkbox" name="isEmergency" class="mt-1 h-5 w-5 rounded border border-red-200 text-red-600 focus:ring-red-500" />
            <span>
              <span class="block text-sm font-semibold text-red-700">Post as Emergency Need</span>
              <span class="mt-1 block text-sm text-slate-600">Emergency needs are shown to other students immediately without admin approval, and students can message you directly.</span>
            </span>
          </label>
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">Item Title</label>
          <input type="text" name="title" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Item Type</label>
          <select name="itemType" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500">
            <option>Select Item Type</option>
          </select>
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Price Type</label>
          <select name="priceType" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500">
            <option value="free">Free</option>
            <option value="rental">Rental</option>
            <option value="sale">Sale</option>
          </select>
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">Price Value</label>
          <input type="text" name="priceValue" placeholder="Ex: 150 / week" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">Description</label>
          <textarea name="description" rows="5" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500"></textarea>
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium text-slate-700">Upload Item Image</label>
          <div class="rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 px-6 py-10 text-center">
            <p class="font-medium text-slate-700">Drag and drop item image here</p>
            <p class="mt-1 text-sm text-slate-500">or click to browse from your computer</p>
          </div>
        </div>

        <div class="md:col-span-2">
          <button type="submit" class="w-full rounded-2xl bg-brand-600 px-5 py-3 font-semibold text-white shadow-soft hover:bg-brand-700">
            Submit Listing
          </button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
