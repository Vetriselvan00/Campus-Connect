<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat | Campus Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#eef2ff",
              100: "#e0e7ff",
              500: "#6366f1",
              600: "#4f46e5",
              700: "#4338ca"
            }
          },
          boxShadow: {
            soft: "0 10px 30px rgba(15, 23, 42, 0.08)"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="min-h-screen lg:grid lg:h-screen lg:grid-cols-[320px_1fr] lg:overflow-hidden">
    <aside class="border-b border-slate-200 bg-white lg:h-screen lg:overflow-y-auto lg:border-b-0 lg:border-r">
      <div class="p-6">
        <div class="flex items-center gap-3">
          <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-brand-600 font-bold text-white">CC</div>
          <div>
            <h1 class="text-lg font-bold text-slate-900">Campus Connect</h1>
            <p class="text-xs text-slate-500">Chats</p>
          </div>
        </div>

        <div class="mt-6">
          <input type="text" placeholder="Search conversation..." class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
        </div>

        <div class="mt-6 space-y-3">
          <div class="rounded-2xl bg-brand-50 p-4">
            <p class="font-semibold text-brand-700">Conversation</p>
            <p class="mt-1 text-sm text-slate-500">Latest message preview</p>
          </div>
          <div class="rounded-2xl bg-slate-50 p-4">
            <p class="font-semibold text-slate-800">Conversation</p>
            <p class="mt-1 text-sm text-slate-500">Latest message preview</p>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex min-h-screen flex-col lg:h-screen lg:min-h-0 lg:overflow-hidden">
      <div class="border-b border-slate-200 bg-white px-6 py-4 lg:shrink-0">
        <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
          <div>
            <h2 class="text-xl font-bold text-slate-900">Conversation Window</h2>
            <p class="text-sm text-slate-500">Peer-to-peer and club communication interface</p>
          </div>
          <div id="chatActionArea" class="hidden flex-wrap gap-3">
            <button id="blockChatButton" type="button" class="rounded-2xl border border-amber-200 px-4 py-2 text-sm font-semibold text-amber-700 hover:bg-amber-50">Block</button>
            <button id="reportChatButton" type="button" class="rounded-2xl border border-rose-200 px-4 py-2 text-sm font-semibold text-rose-700 hover:bg-rose-50">Report</button>
          </div>
        </div>
        <div id="chatStatusBanner" class="mt-3 hidden rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm font-semibold text-amber-800"></div>
      </div>

      <div class="flex-1 space-y-4 overflow-y-auto bg-slate-50 px-6 py-6 lg:min-h-0">
        <div class="max-w-md rounded-2xl bg-white p-4 shadow-soft">
          <p class="text-slate-700">Incoming message block</p>
        </div>
        <div class="ml-auto max-w-md rounded-2xl bg-brand-600 p-4 text-white shadow-soft">
          <p>Outgoing message block</p>
        </div>
      </div>

      <div class="border-t border-slate-200 bg-white p-4 lg:shrink-0">
        <div class="flex gap-3">
          <input type="text" placeholder="Type your message..." class="flex-1 rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-brand-500" />
          <button class="rounded-2xl bg-brand-600 px-5 py-3 font-semibold text-white hover:bg-brand-700">Send</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
